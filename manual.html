<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WET Hub Manual</title>
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/loren-6q/WETNav/main/favicon.png">
    <style>
        :root { --blue: #37b5ff; --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; --border: #334155; }
        body { background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; margin: 0; padding: 60px 20px 100px; line-height: 1.6; }
        .container { max-width: 900px; margin: 0 auto; }
        
        header { border-left: 4px solid gold; padding-left: 20px; margin-bottom: 40px; display: flex; justify-content: space-between; align-items: center; }
        header h1 { margin: 0; font-size: 32px; font-weight: 900; }
        header p { margin: 0; color: #64748b; font-weight: bold; font-size: 14px; }
        
        .search-box { width: 100%; padding: 16px; background: var(--card); border: 1px solid var(--border); border-radius: 12px; color: white; font-size: 16px; margin-bottom: 30px; outline: none; }
        
        .manual-section h2 { font-size: 13px; text-transform: uppercase; letter-spacing: 3px; color: var(--blue); border-bottom: 1px solid var(--border); padding-bottom: 12px; margin: 40px 0 20px; }
        
        .app-entry { background: var(--card); border-radius: 14px; padding: 25px; margin-bottom: 30px; border: 1px solid var(--border); }
        .app-title { font-size: 22px; font-weight: 800; color: white; margin-bottom: 15px; display: block; }
        
        .instructions { background: rgba(0, 0, 0, 0.3); padding: 20px; border-radius: 10px; font-size: 16px; color: #cbd5e1; border: 1px solid rgba(255,255,255,0.1); min-height: 50px; transition: 0.2s; }
        .instructions:focus { outline: 2px solid gold; background: rgba(55, 181, 255, 0.05); }
        
        /* FULL RICH TEXT TOOLBAR */
        #editor-tools { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #fff; padding: 10px 20px; border-radius: 50px; display: none; gap: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 1000002; align-items: center; }
        #editor-tools button { background: #eee; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; font-weight: bold; color: #333; transition: 0.2s; }
        #editor-tools button:hover { background: var(--blue); color: white; }
        #save-cloud-btn { background: #10b981 !important; color: white !important; margin-left: 10px; padding: 8px 16px !important; }
        #save-cloud-btn:hover { background: #059669 !important; }
        
        .hidden { display: none !important; }
    </style>
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <div><h1>COMPANY MANUAL</h1><p id="mode-text">Read Only (Connecting...)</p></div>
            <a href="index.html" style="color:var(--blue); text-decoration:none; font-weight:bold; font-size:20px;">← HUB</a>
        </header>

        <div id="editor-tools">
            <button onclick="execCmd('bold')" title="Bold">B</button>
            <button onclick="execCmd('italic')" title="Italic">I</button>
            <button onclick="execCmd('underline')" title="Underline">U</button>
            <button onclick="execCmd('formatBlock', 'H1')" title="Header 1">H1</button>
            <button onclick="execCmd('formatBlock', 'H2')" title="Header 2">H2</button>
            <button onclick="execCmd('formatBlock', 'H3')" title="Header 3">H3</button>
            <button onclick="execCmd('insertUnorderedList')" title="Bullet List">• List</button>
            <button id="save-cloud-btn" onclick="saveToCloud()">💾 SAVE TO CLOUD</button>
        </div>

        <input type="text" id="manualSearch" class="search-box" placeholder="Search instructions..." onkeyup="searchManual()">
        <div id="manual-content"></div>
    </div>

    <script src="nav.js"></script>
    <script>
        // ==========================================
        // 1. FIREBASE CONFIGURATION
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyAZP4qv_VYnWNlChvq8NXMVuZPMmReiiHg",
            authDomain: "wethub2.firebaseapp.com",
            databaseURL: "https://wethub2-default-rtdb.asia-southeast1.firebasedatabase.app", 
            projectId: "wethub2",
            storageBucket: "wethub2.firebasestorage.app",
            messagingSenderId: "142301545183",
            appId: "1:142301545183:web:4c2cb3db629fb44764df6a"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // ==========================================
        // 2. APP LOGIC
        // ==========================================
        const user = new URLSearchParams(window.location.search).get('user');
        const isBoss = user === 'BOSS';

        // LIVE CONNECTION MONITOR
        const modeText = document.getElementById('mode-text');
        db.ref('.info/connected').on('value', function(snap) {
            if (snap.val() === true) {
                modeText.innerText = isBoss ? 'EDIT MODE (🟢 ONLINE)' : 'Read Only (🟢 ONLINE)';
                modeText.style.color = isBoss ? 'gold' : '#10b981';
            } else {
                modeText.innerText = isBoss ? 'EDIT MODE (🔴 OFFLINE)' : 'Read Only (🔴 OFFLINE)';
                modeText.style.color = '#ef4444';
            }
        });

        if(isBoss) {
            document.getElementById('editor-tools').style.display = 'flex';
        }

        function execCmd(cmd, val = null) { 
            document.execCommand(cmd, false, val); 
        }

        let isBuilt = false;

        const buildManual = async () => {
            if (isBuilt) return true;
            const navLinks = document.querySelectorAll('#global-nav a');
            const content = document.getElementById('manual-content');
            if (navLinks.length < 2) return false;

            isBuilt = true; 
            const cats = { accounting: "Accounting", admin: "Administration", booking: "Booking", quotes: "Quotes", staffing: "Staffing", ops: "Operations" };
            content.innerHTML = '';

            Object.keys(cats).forEach(cat => {
                const sec = document.createElement('div');
                sec.className = 'manual-section';
                sec.id = `parent-${cat}`;
                sec.innerHTML = `<h2>${cats[cat]}</h2><div id="sec-${cat}"></div>`;
                content.appendChild(sec);
            });

            navLinks.forEach(link => {
                const type = link.getAttribute('data-type');
                if (!type || !cats[type]) return;

                const entry = document.createElement('div');
                entry.className = 'app-entry';
                const fallbackText = link.getAttribute('data-manual') || link.getAttribute('data-desc') || "Loading from cloud...";

                // THIS IS THE FIX: Remove periods and brackets from the ID so Firebase doesn't crash
                const safeId = link.innerText.trim().replace(/[.#$\[\]]/g, '_');

                entry.innerHTML = `
                    <span class="app-title">${link.getAttribute('data-icon') || '🔗'} ${link.innerText}</span>
                    <div class="instructions" 
                         contenteditable="${isBoss}" 
                         data-id="${safeId}">
                         ${fallbackText}
                    </div>
                `;
                document.getElementById(`sec-${type}`).appendChild(entry);
            });

            Object.keys(cats).forEach(cat => {
                if (document.getElementById(`sec-${cat}`).children.length === 0) {
                    document.getElementById(`parent-${cat}`).remove();
                }
            });

            try {
                const snapshot = await db.ref('wet_manual_docs').once('value');
                const cloudData = snapshot.val();
                
                if (cloudData) {
                    document.querySelectorAll('.instructions').forEach(box => {
                        const id = box.getAttribute('data-id');
                        if (cloudData[id]) {
                            box.innerHTML = cloudData[id];
                        }
                    });
                }
            } catch (error) {
                console.error("Error loading manual:", error);
            }

            return true;
        };

        function saveToCloud() {
            const btn = document.getElementById('save-cloud-btn');
            btn.innerText = '⏳ SAVING...';
            
            try {
                let dataToSave = {};
                document.querySelectorAll('.instructions').forEach(box => {
                    const id = box.getAttribute('data-id');
                    dataToSave[id] = box.innerHTML;
                });

                const timeout = new Promise((resolve, reject) => {
                    setTimeout(() => reject(new Error("Timeout: Could not connect to Database. Check your URL or Rules.")), 5000);
                });

                Promise.race([
                    db.ref('wet_manual_docs').set(dataToSave),
                    timeout
                ])
                .then(() => {
                    btn.innerText = '✅ SAVED TO CLOUD';
                    btn.style.background = '#059669';
                    setTimeout(() => {
                        btn.innerText = '💾 SAVE TO CLOUD';
                        btn.style.background = '';
                    }, 2000);
                })
                .catch((error) => {
                    console.error("Save failed:", error);
                    
                    if(error.message.includes('permission_denied')) {
                        alert("Firebase Rules Error: You need to set .read and .write to true in your Firebase Console.");
                    } else {
                        alert(error.message);
                    }

                    btn.innerText = '❌ ERROR';
                    btn.style.background = '#ef4444';
                    setTimeout(() => {
                        btn.innerText = '💾 TRY AGAIN';
                        btn.style.background = '';
                    }, 3000);
                });
            } catch (err) {
                // Catches synchronous errors (like bad keys)
                console.error("Sync error:", err);
                alert("Error: " + err.message);
                btn.innerText = '❌ ERROR';
                btn.style.background = '#ef4444';
                setTimeout(() => {
                    btn.innerText = '💾 TRY AGAIN';
                    btn.style.background = '';
                }, 3000);
            }
        }

        function searchManual() {
            let input = document.getElementById('manualSearch').value.toLowerCase();
            document.querySelectorAll('.app-entry').forEach(e => {
                e.classList.toggle('hidden', !e.innerText.toLowerCase().includes(input));
            });
            document.querySelectorAll('.manual-section').forEach(s => {
                s.classList.toggle('hidden', s.querySelectorAll('.app-entry:not(.hidden)').length === 0);
            });
        }

        const observer = new MutationObserver(() => { if (buildManual()) observer.disconnect(); });
        observer.observe(document.body, { childList: true, subtree: true });
    </script>
</body>
</html>
