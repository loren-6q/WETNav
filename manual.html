<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WET Hub Manual</title>
    <style>
        :root { --blue: #37b5ff; --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; }
        body { background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; margin: 0; padding: 60px 20px 100px; }
        .container { max-width: 800px; margin: 0 auto; }
        header { border-bottom: 2px solid var(--blue); padding-bottom: 20px; margin-bottom: 40px; }
        header h1 { margin: 0; font-size: 32px; font-weight: 900; }
        header p { color: #64748b; margin: 5px 0 0; }
        
        .search-box { width: 100%; padding: 15px; background: var(--card); border: 1px solid #334155; border-radius: 8px; color: white; font-size: 16px; margin-bottom: 30px; }
        
        .manual-section { margin-bottom: 50px; }
        .manual-section h2 { font-size: 14px; text-transform: uppercase; letter-spacing: 2px; color: var(--blue); border-bottom: 1px solid #334155; padding-bottom: 10px; }
        
        .app-entry { background: var(--card); border-radius: 12px; padding: 20px; margin-bottom: 15px; border-left: 4px solid #334155; transition: 0.2s; }
        .app-entry:hover { border-left-color: var(--blue); transform: translateX(5px); }
        .app-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .app-icon { font-size: 24px; }
        .app-title { font-size: 20px; font-weight: 800; }
        .app-desc { color: #94a3b8; font-style: italic; margin-bottom: 15px; font-size: 14px; }
        
        .instructions { background: rgba(0,0,0,0.2); padding: 15px; border-radius: 6px; font-size: 14px; line-height: 1.6; border: 1px dashed #334155; }
        .instructions b { color: var(--blue); }
        
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>COMPANY MANUAL</h1>
            <p>Instructions and descriptions for all WET Hub tools.</p>
        </header>

        <input type="text" id="manualSearch" class="search-box" placeholder="Search for a tool or keyword (e.g. 'payroll', 'booking')..." onkeyup="searchManual()">

        <div id="manual-content">
            </div>
    </div>

    <script src="nav.js"></script>
    <script>
        const buildManual = () => {
            const navLinks = document.querySelectorAll('#global-nav a');
            const content = document.getElementById('manual-content');
            if (navLinks.length < 2) return false;

            const categories = {
                accounting: "Accounting & Finance",
                admin: "Administration",
                booking: "Booking & Reservations",
                quotes: "Price Quotes & Comparisons",
                staffing: "Staffing & HR",
                ops: "Operations"
            };

            const sections = {};
            Object.keys(categories).forEach(cat => {
                const sec = document.createElement('div');
                sec.className = 'manual-section';
                sec.innerHTML = `<h2>${categories[cat]}</h2><div id="sec-${cat}"></div>`;
                content.appendChild(sec);
                sections[cat] = document.getElementById(`sec-${cat}`);
            });

            navLinks.forEach(link => {
                const type = link.getAttribute('data-type');
                if (!type || !sections[type]) return;

                const name = link.innerText;
                const icon = link.getAttribute('data-icon') || '🔗';
                const desc = link.getAttribute('data-desc') || 'Company tool.';

                const entry = document.createElement('div');
                entry.className = 'app-entry';
                entry.innerHTML = `
                    <div class="app-header">
                        <span class="app-icon">${icon}</span>
                        <span class="app-title">${name}</span>
                    </div>
                    <div class="app-desc">${desc}</div>
                    <div class="instructions">
                        ${getInstructions(name)}
                    </div>
                `;
                sections[type].appendChild(entry);
            });
            return true;
        };

        // BASIC TEMPLATE - You can expand these strings!
        function getInstructions(appName) {
            const docs = {
                "Salaries": "Used by <b>BOSS only</b>. Enter staff hours here to calculate monthly payroll. Data is synced to the private secure sheet.",
                "Loventis (PMS)": "Main reservation system. All check-ins and check-outs must be logged here immediately. <b>Reception:</b> Ensure guest contact details are complete.",
                "WET Pricer": "Use this tool when a guest asks 'How much?'. It compares our direct rates against B.com to ensure we are always competitive.",
                "Doors": "Room access control. Requires <b>BOSS, REC, or HK</b> level access. Select the room number and toggle the lock status.",
                "Stock": "Log all inventory arrivals here. <b>BAR:</b> Perform counts every Sunday night.",
                "Parser": "Upload raw CSV files from Booking.com or AirBnB here to clean the data for our internal records."
            };
            return docs[appName] || "Select the tool from the Hub to begin. For login issues, contact the system admin.";
        }

        function searchManual() {
            let input = document.getElementById('manualSearch').value.toLowerCase();
            let entries = document.getElementsByClassName('app-entry');
            for (let i = 0; i < entries.length; i++) {
                if (!entries[i].innerHTML.toLowerCase().includes(input)) {
                    entries[i].classList.add('hidden');
                } else {
                    entries[i].classList.remove('hidden');
                }
            }
        }

        const observer = new MutationObserver(() => { if (buildManual()) observer.disconnect(); });
        observer.observe(document.body, { childList: true, subtree: true });
    </script>
</body>
</html>
