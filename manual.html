<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WET Hub Manual</title>
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/loren-6q/WETNav/main/favicon.png">
    <style>
        :root { --blue: #37b5ff; --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; --border: #334155; }
        body { background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; margin: 0; padding: 60px 20px 100px; line-height: 1.6; }
        .container { max-width: 900px; margin: 0 auto; }
        header { border-left: 4px solid gold; padding-left: 20px; margin-bottom: 40px; }
        .manual-section h2 { font-size: 13px; text-transform: uppercase; letter-spacing: 3px; color: var(--blue); border-bottom: 1px solid var(--border); padding-bottom: 12px; margin: 40px 0 20px; }
        .app-entry { background: var(--card); border-radius: 14px; padding: 25px; margin-bottom: 20px; border: 1px solid var(--border); }
        .app-title { font-size: 22px; font-weight: 800; color: white; margin-bottom: 15px; display: block; }
        .instructions { background: rgba(0,0,0,0.3); padding: 20px; border-radius: 10px; font-size: 16px; color: #cbd5e1; border: 1px solid rgba(255,255,255,0.05); }
        .instructions:focus { outline: 2px solid gold; }
        #editor-tools { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #fff; padding: 10px 20px; border-radius: 50px; display: none; gap: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 1000002; }
        #editor-tools button { background: #eee; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; font-weight: bold; color: #333; }
        .save-btn { background: #10b981 !important; color: white !important; }
        .export-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000005; justify-content: center; align-items: center; padding: 20px; }
        pre { background: #000; color: #adff2f; padding: 20px; overflow: auto; font-size: 11px; max-height: 500px; border-radius: 10px; width: 100%; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="container">
        <header><h1>COMPANY MANUAL</h1><p id="mode-text">Read Only</p></header>
        <div id="editor-tools">
            <button onclick="document.execCommand('bold')">B</button>
            <button onclick="document.execCommand('insertUnorderedList')">• List</button>
            <button class="save-btn" onclick="showExport()">🚀 EXPORT NEW NAV.JS</button>
        </div>
        <div id="manual-content"></div>
    </div>
    <div id="export-overlay" class="export-overlay">
        <div style="background:var(--card); padding:30px; border-radius:15px; width:90%; max-width:800px;">
            <h2>Copy this code into nav.js</h2>
            <pre id="export-code"></pre>
            <button onclick="location.reload()" style="background:var(--blue); color:white; padding:10px 20px; border-radius:5px; margin-top:10px;">Done</button>
        </div>
    </div>
    <script src="nav.js"></script>
    <script>
        const user = new URLSearchParams(window.location.search).get('user');
        const isBoss = user === 'BOSS';
        if(isBoss) { document.getElementById('editor-tools').style.display='flex'; document.getElementById('mode-text').innerText='EDIT MODE'; }
        const buildManual = () => {
            const navLinks = document.querySelectorAll('#global-nav a'); const content = document.getElementById('manual-content');
            if (navLinks.length < 2) return false;
            const cats = { accounting: "Accounting", admin: "Administration", booking: "Booking", quotes: "Quotes", staffing: "Staffing", ops: "Operations" };
            content.innerHTML = '';
            Object.keys(cats).forEach(cat => { const sec = document.createElement('div'); sec.className = 'manual-section'; sec.id = `parent-${cat}`; sec.innerHTML = `<h2>${cats[cat]}</h2><div id="sec-${cat}"></div>`; content.appendChild(sec); });
            navLinks.forEach(link => {
                const type = link.getAttribute('data-type'); if (!type || !cats[type]) return;
                const entry = document.createElement('div'); entry.className = 'app-entry';
                // Pull Detailed Manual Text
                const manualText = link.getAttribute('data-manual') || "Enter instructions...";
                entry.innerHTML = `<span class="app-title">${link.getAttribute('data-icon')} ${link.innerText}</span><div class="instructions" contenteditable="${isBoss}" data-id="${link.innerText.trim()}">${manualText}</div>`;
                document.getElementById(`sec-${type}`).appendChild(entry);
            });
            return true;
        };
        function showExport() {
            let rawFunc = renderNav.toString();
            document.querySelectorAll('.instructions').forEach(box => {
                const id = box.getAttribute('data-id');
                const newManual = box.innerHTML.replace(/\n/g, '').trim();
                const regex = new RegExp(`data-manual="([^"]*)"([^>]*>${id}<)`, 'g');
                rawFunc = rawFunc.replace(regex, `data-manual="${newManual}"$2`);
            });
            document.getElementById('export-code').innerText = "const navStyle = `" + navStyle + "`;\n\nconst renderNav = " + rawFunc + ";\n\nrenderNav();";
            document.getElementById('export-overlay').style.display = 'flex';
        }
        const observer = new MutationObserver(() => { if (buildManual()) observer.disconnect(); }); observer.observe(document.body, { childList: true, subtree: true });
    </script>
</body>
</html>
