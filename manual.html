<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WET Hub Manual</title>
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/loren-6q/WETNav/main/favicon.png">
    <style>
        :root { --blue: #37b5ff; --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; --border: #334155; }
        body { background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; margin: 0; padding: 60px 20px 100px; line-height: 1.6; }
        .container { max-width: 900px; margin: 0 auto; }
        
        header { border-left: 4px solid gold; padding-left: 20px; margin-bottom: 40px; display: flex; justify-content: space-between; align-items: center; }
        header h1 { margin: 0; font-size: 32px; font-weight: 900; }
        
        .search-box { width: 100%; padding: 16px; background: var(--card); border: 1px solid var(--border); border-radius: 12px; color: white; font-size: 16px; margin-bottom: 30px; outline: none; }
        
        .manual-section h2 { font-size: 13px; text-transform: uppercase; letter-spacing: 3px; color: var(--blue); border-bottom: 1px solid var(--border); padding-bottom: 12px; margin: 40px 0 20px; }
        
        .app-entry { background: var(--card); border-radius: 14px; padding: 25px; margin-bottom: 30px; border: 1px solid var(--border); }
        .app-title { font-size: 22px; font-weight: 800; color: white; margin-bottom: 15px; display: block; }
        
        /* THE EDITOR BOX */
        .instructions { background: rgba(0, 0, 0, 0.3); padding: 20px; border-radius: 10px; font-size: 16px; color: #cbd5e1; border: 1px solid rgba(255,255,255,0.1); min-height: 50px; }
        .instructions:focus { outline: 2px solid var(--blue); background: rgba(55, 181, 255, 0.05); }
        
        /* TOOLBAR */
        #editor-tools { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #fff; padding: 10px 20px; border-radius: 50px; display: none; gap: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 1000002; align-items: center; }
        #editor-tools button { background: #eee; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; font-weight: bold; color: #333; }
        #editor-tools button:hover { background: var(--blue); color: white; }
        .save-btn { background: #10b981 !important; color: white !important; margin-left: 10px; }
        
        .export-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000005; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; }
        .export-content { background: var(--card); padding: 30px; border-radius: 15px; width: 100%; max-width: 800px; }
        pre { background: #000; color: #adff2f; padding: 15px; overflow-x: auto; font-size: 11px; border-radius: 8px; max-height: 400px; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div><h1>COMPANY MANUAL</h1><p id="mode-text">Read Only</p></div>
            <a href="index.html" style="color:var(--blue); text-decoration:none; font-weight:bold;">← HUB</a>
        </header>

        <div id="editor-tools">
            <button onclick="exec('bold')">B</button>
            <button onclick="exec('italic')">I</button>
            <button onclick="exec('insertUnorderedList')">• List</button>
            <button onclick="exec('formatBlock', 'h3')">H</button>
            <button class="save-btn" onclick="showExport()">🚀 EXPORT TO NAV.JS</button>
        </div>

        <input type="text" id="manualSearch" class="search-box" placeholder="Search instructions...">
        <div id="manual-content"></div>
    </div>

    <div id="export-overlay" class="export-overlay">
        <div class="export-content">
            <h2>Copy this into your nav.js</h2>
            <p style="font-size:13px; color:#94a3b8;">Replace the "renderNav" function in your nav.js with this code:</p>
            <pre id="export-code"></pre>
            <button onclick="document.getElementById('export-overlay').style.display='none'" style="background:var(--blue); color:white; padding:10px 20px; border-radius:5px; margin-top:10px;">Done</button>
        </div>
    </div>

    <script src="nav.js"></script>
    <script>
        const user = new URLSearchParams(window.location.search).get('user');
        const isBoss = user === 'BOSS';

        if(isBoss) {
            document.getElementById('editor-tools').style.display = 'flex';
            document.getElementById('mode-text').innerText = 'EDIT MODE ACTIVE';
            document.getElementById('mode-text').style.color = 'gold';
        }

        function exec(cmd, val = null) { document.execCommand(cmd, false, val); }

        const buildManual = () => {
            const navLinks = document.querySelectorAll('#global-nav a');
            const content = document.getElementById('manual-content');
            if (navLinks.length < 2) return false;

            const cats = { accounting: "Accounting", admin: "Administration", booking: "Booking", quotes: "Quotes", staffing: "Staffing", ops: "Operations" };
            content.innerHTML = '';

            Object.keys(cats).forEach(cat => {
                const sec = document.createElement('div');
                sec.className = 'manual-section';
                sec.id = `parent-${cat}`;
                sec.innerHTML = `<h2>${cats[cat]}</h2><div id="sec-${cat}"></div>`;
                content.appendChild(sec);
            });

            navLinks.forEach(link => {
                const type = link.getAttribute('data-type');
                if (!type || !cats[type]) return;

                const entry = document.createElement('div');
                entry.className = 'app-entry';
                const currentText = link.getAttribute('data-desc') || "Enter instructions here...";

                entry.innerHTML = `
                    <span class="app-title">${link.getAttribute('data-icon')} ${link.innerText}</span>
                    <div class="instructions" 
                         contenteditable="${isBoss}" 
                         data-id="${link.innerText.trim()}">
                         ${currentText}
                    </div>
                `;
                document.getElementById(`sec-${type}`).appendChild(entry);
            });
            return true;
        };

        function showExport() {
            let navCode = document.querySelector('script[src="nav.js"]').nextElementSibling || document.scripts[document.scripts.length-1];
            let rawFunc = renderNav.toString();
            
            // Collect all edits
            document.querySelectorAll('.instructions').forEach(box => {
                const id = box.getAttribute('data-id');
                const newText = box.innerHTML.replace(/\n/g, '').trim();
                // Replace in the string logic
                const regex = new RegExp(`data-desc="([^"]*)"([^>]*>${id}<)`, 'g');
                rawFunc = rawFunc.replace(regex, `data-desc="${newText}"$2`);
            });

            document.getElementById('export-code').innerText = rawFunc + "\nrenderNav();";
            document.getElementById('export-overlay').style.display = 'flex';
        }

        const observer = new MutationObserver(() => { if (buildManual()) observer.disconnect(); });
        observer.observe(document.body, { childList: true, subtree: true });
    </script>
</body>
</html>
