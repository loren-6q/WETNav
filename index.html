<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WET Business Hub</title>
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/loren-6q/WETNav/main/favicon.png">
    <style>
        :root { 
            --wet-blue: #37b5ff; --bg: #0f172a; --card: #1e293b; --border: #334155;
            --col-acct: #ef4444; --col-admin: #6366f1; --col-book: #f59e0b;
            --col-staff: #ec4899; --col-quote: #10b981; --col-ops: #37b5ff;
        }
        body { background: var(--bg); color: #f1f5f9; font-family: system-ui, sans-serif; margin: 0; padding-top: 60px; display: flex; flex-direction: column; align-items: center; }
        .hub-container { max-width: 1100px; width: 95%; margin-top: 20px; padding-bottom: 80px; }
        
        header { display: flex; justify-content: space-between; align-items: flex-start; width: 100%; border-left: 4px solid gold; padding-left: 15px; margin-bottom: 20px; }
        header h1 { font-size: 28px; font-weight: 900; margin: 0; letter-spacing: -0.5px; }
        header p { color: #64748b; font-size: 11px; text-transform: uppercase; font-weight: 800; margin-top: 4px; }
        
        .manual-link { color: #475569; text-decoration: none; font-size: 22px; transition: 0.2s; padding: 5px; }
        .manual-link:hover { color: gold; transform: scale(1.1); }

        /* Hub Search */
        .search-container { width: 100%; margin-bottom: 30px; }
        #hubSearch { width: 100%; padding: 14px 20px; background: var(--card); border: 1px solid var(--border); border-radius: 10px; color: white; font-size: 15px; outline: none; box-sizing: border-box; }
        #hubSearch:focus { border-color: var(--wet-blue); box-shadow: 0 0 10px rgba(55, 181, 255, 0.2); }

        h2 { color: var(--wet-blue); border-bottom: 1px solid var(--border); padding-bottom: 8px; margin-top: 40px; font-size: 12px; letter-spacing: 2px; text-transform: uppercase; font-weight: 800; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 16px; margin-top: 15px; }

        .card { background: var(--card); border: 1px solid var(--border); padding: 24px; border-radius: 12px; text-decoration: none; color: white; transition: 0.2s; display: flex; flex-direction: column; position: relative; overflow: hidden; }
        .card:hover { border-color: gold; transform: translateY(-4px); box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        
        .card.accounting { border-top: 4px solid var(--col-acct); background: linear-gradient(180deg, rgba(239, 68, 68, 0.05) 0%, var(--card) 100%); }
        .card.admin { border-top: 4px solid var(--col-admin); background: linear-gradient(180deg, rgba(99, 102, 241, 0.05) 0%, var(--card) 100%); }
        .card.booking { border-top: 4px solid var(--col-book); background: linear-gradient(180deg, rgba(245, 158, 11, 0.05) 0%, var(--card) 100%); }
        .card.staffing { border-top: 4px solid var(--col-staff); background: linear-gradient(180deg, rgba(236, 72, 153, 0.05) 0%, var(--card) 100%); }
        .card.quotes { border-top: 4px solid var(--col-quote); background: linear-gradient(180deg, rgba(16, 185, 129, 0.05) 0%, var(--card) 100%); }
        .card.ops { border-top: 4px solid var(--col-ops); background: linear-gradient(180deg, rgba(55, 181, 255, 0.05) 0%, var(--card) 100%); }

        .card .emoji { font-size: 24px; margin-bottom: 8px; }
        .card .title { font-weight: 800; font-size: 17px; }
        .card .desc { font-size: 12px; color: #94a3b8; margin-top: 6px; line-height: 1.4; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="hub-container">
        <header>
            <div>
                <h1>WET BUSINESS HUB</h1>
                <p id="role-tag">Validating...</p>
            </div>
            <a href="manual.html" class="manual-link" title="Company Manual">📖</a>
        </header>

        <div class="search-container">
            <input type="text" id="hubSearch" placeholder="Search apps by name or description..." onkeyup="filterHub()">
        </div>

        <section id="sec-accounting" class="hidden"><h2>Accounting</h2><div id="grid-accounting" class="grid"></div></section>
        <section id="sec-admin" class="hidden"><h2>Administration</h2><div id="grid-admin" class="grid"></div></section>
        <section id="sec-booking" class="hidden"><h2>Booking & Reservations</h2><div id="grid-booking" class="grid"></div></section>
        <section id="sec-quotes" class="hidden"><h2>Price Quotes</h2><div id="grid-quotes" class="grid"></div></section>
        <section id="sec-staffing" class="hidden"><h2>Staffing & HR</h2><div id="grid-staffing" class="grid"></div></section>
        <section id="sec-ops" class="hidden"><h2>Operations</h2><div id="grid-ops" class="grid"></div></section>

        <div id="status-msg" style="margin-top:50px; color:#475569;">Building workspace...</div>
    </div>

    <script src="nav.js"></script>
    <script>
        const buildDashboard = () => {
            const navLinks = document.querySelectorAll('#global-nav a');
            if (navLinks.length === 0) return false;
            const user = new URLSearchParams(window.location.search).get('user') || 'Staff';
            document.getElementById('role-tag').textContent = `ACCESS LEVEL: ${user}`;

            const groups = {
                accounting: { grid: document.getElementById('grid-accounting'), sec: document.getElementById('sec-accounting'), count: 0 },
                admin: { grid: document.getElementById('grid-admin'), sec: document.getElementById('sec-admin'), count: 0 },
                booking: { grid: document.getElementById('grid-booking'), sec: document.getElementById('sec-booking'), count: 0 },
                staffing: { grid: document.getElementById('grid-staffing'), sec: document.getElementById('sec-staffing'), count: 0 },
                quotes: { grid: document.getElementById('grid-quotes'), sec: document.getElementById('sec-quotes'), count: 0 },
                ops: { grid: document.getElementById('grid-ops'), sec: document.getElementById('sec-ops'), count: 0 }
            };

            Object.values(groups).forEach(g => { g.grid.innerHTML = ''; g.sec.classList.add('hidden'); });

            navLinks.forEach(link => {
                const type = link.getAttribute('data-type');
                if (!type || !groups[type]) return;
                const card = document.createElement('a');
                card.className = `card ${type}`;
                card.href = link.href;
                if (link.target === '_blank') card.target = '_blank';
                card.innerHTML = `<span class="emoji">${link.getAttribute('data-icon') || '🔗'}</span><span class="title">${link.innerText}</span><span class="desc">${link.getAttribute('data-desc') || ''}</span>`;
                groups[type].grid.appendChild(card);
                groups[type].count++;
            });

            Object.values(groups).forEach(g => { if (g.count > 0) g.sec.classList.remove('hidden'); });
            document.getElementById('status-msg').classList.add('hidden');
            return true;
        };

        function filterHub() {
            const query = document.getElementById('hubSearch').value.toLowerCase();
            const cards = document.querySelectorAll('.card');
            const sections = document.querySelectorAll('section');

            cards.forEach(card => {
                const text = card.innerText.toLowerCase();
                card.style.display = text.includes(query) ? 'flex' : 'none';
            });

            sections.forEach(sec => {
                const visibleCards = sec.querySelectorAll('.card[style="display: flex;"]');
                sec.style.display = visibleCards.length > 0 ? 'block' : 'none';
            });
        }

        const observer = new MutationObserver(() => { if (buildDashboard()) observer.disconnect(); });
        observer.observe(document.body, { childList: true, subtree: true });
    </script>
</body>
</html>
