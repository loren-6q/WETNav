<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hub Configurator | WET</title>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; padding: 30px; }
        .container { max-width: 900px; margin: 0 auto; }
        .app-item { background: #1e293b; border: 1px solid #334155; padding: 15px; border-radius: 8px; margin-bottom: 10px; }
        .row { display: flex; gap: 10px; margin-bottom: 8px; }
        input, textarea, select { background: #0f172a; border: 1px solid #334155; color: white; padding: 8px; border-radius: 4px; }
        .perms { font-size: 11px; background: rgba(0,0,0,0.2); padding: 8px; border-radius: 4px; margin-top: 8px; }
        button { cursor: pointer; border: none; border-radius: 4px; font-weight: bold; padding: 10px 20px; }
        .btn-add { background: #37b5ff; color: white; }
        .btn-gen { background: gold; color: black; font-size: 16px; width: 100%; margin-top: 20px; }
        pre { background: #000; padding: 20px; color: #adff2f; font-size: 11px; border: 1px solid gold; white-space: pre-wrap; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Hub Configurator</h1>
        <div id="app-list"></div>
        <button class="btn-add" onclick="addApp()">+ Add New App</button>
        <button class="btn-gen" onclick="generate()">🚀 Generate nav.js Code</button>
        <div id="output" style="display:none">
            <h3>Copy and overwrite your nav.js file:</h3>
            <pre id="code-box"></pre>
        </div>
    </div>

    <script>
        let apps = JSON.parse(localStorage.getItem('wet_hub_db')) || [
            { name: 'Salaries', url: 'https://wetsalaries.netlify.app/', type: 'accounting', icon: '💰', desc: 'Staff payroll.', roles: ['BOSS'] },
            { name: 'MyAllocator', url: 'https://inbox.myallocator.com/en/availability/58137', type: 'admin', icon: '🔑', desc: 'Channel manager.', roles: ['BOSS', 'REC'] },
            { name: 'Loventis (PMS)', url: 'https://sg.loventis.net/Reception', type: 'booking', icon: '🏩', desc: 'Reservation management.', roles: ['BOSS', 'REC'] },
            { name: 'Scheduler', url: 'https://staff-scheduler.onrender.com/', type: 'staffing', icon: '📅', desc: 'Schedule part-time staff.', roles: ['BOSS', 'REC'] }
        ];

        function render() {
            const list = document.getElementById('app-list');
            list.innerHTML = '';
            apps.forEach((app, i) => {
                list.innerHTML += `
                    <div class="app-item">
                        <div class="row">
                            <input type="text" value="${app.name}" oninput="apps[${i}].name=this.value" placeholder="Name" style="flex:1">
                            <input type="text" value="${app.icon}" oninput="apps[${i}].icon=this.value" placeholder="Icon" style="width:40px">
                            <select onchange="apps[${i}].type=this.value">
                                <option value="accounting" ${app.type==='accounting'?'selected':''}>Accounting</option>
                                <option value="admin" ${app.type==='admin'?'selected':''}>Admin</option>
                                <option value="booking" ${app.type==='booking'?'selected':''}>Booking</option>
                                <option value="staffing" ${app.type==='staffing'?'selected':''}>Staffing</option>
                                <option value="quotes" ${app.type==='quotes'?'selected':''}>Quotes</option>
                                <option value="ops" ${app.type==='ops'?'selected':''}>Ops</option>
                            </select>
                        </div>
                        <input type="text" value="${app.url}" oninput="apps[${i}].url=this.value" placeholder="URL" style="width:97%">
                        <textarea oninput="apps[${i}].desc=this.value" style="width:97%; height:40px; margin-top:5px;">${app.desc}</textarea>
                        <div class="perms">
                            Roles: ${['BOSS', 'REC', 'BAR', 'OA'].map(r => `
                                <label><input type="checkbox" ${app.roles.includes(r)?'checked':''} onchange="toggleRole(${i},'${r}')"> ${r}</label>
                            `).join('')}
                            <button onclick="apps.splice(${i},1); render();" style="float:right; background:red; color:white; padding:2px 10px;">Delete</button>
                        </div>
                    </div>`;
            });
            localStorage.setItem('wet_hub_db', JSON.stringify(apps));
        }

        function toggleRole(i, r) {
            let idx = apps[i].roles.indexOf(r);
            idx > -1 ? apps[i].roles.splice(idx,1) : apps[i].roles.push(r);
            render();
        }

        function addApp() { apps.push({name:'', url:'', type:'ops', icon:'🔗', desc:'', roles:['BOSS']}); render(); }

        function generate() {
            let logic = "";
            apps.forEach(app => {
                const roles = app.roles.map(r => `'${r}'`).join(',');
                logic += `    if ([${roles}].includes(user)) html += \`<a href="\${fix('${app.url}')}" target="_blank" data-type="${app.type}" data-icon="${app.icon}" data-desc="${app.desc}">${app.name}</a>\`;\n`;
            });

            document.getElementById('code-box').innerText = `const navStyle = \`<style>#global-nav { background: #37b5ff; color: white; font-family: sans-serif; position: fixed; top: 0; left: 0; width: 100%; z-index: 999999; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; height: 40px; } .nav-logo { display: flex; align-items: center; gap: 8px; text-decoration: none; color: white; font-weight: 800; font-size: 14px; } .nav-logo img { height: 24px; } #nav-links { display: flex; gap: 5px; height: 100%; } .nav-item { display: flex; align-items: center; } .nav-item a { color: white; text-decoration: none; font-size: 11px; font-weight: 600; padding: 0 10px; text-transform: uppercase; }</style>\`;
const renderNav = () => {
    const user = new URLSearchParams(window.location.search).get('user') || 'Staff';
    const fix = (u) => (['github.io','vercel.app','onrender.com'].some(d => u.includes(d)) && !u.includes('user=')) ? u + (u.includes('?') ? '&' : '?') + 'user=' + user : u;
    let html = '<div class="nav-item"><a href="' + fix('https://loren-6q.github.io/WETNav/') + '">Home</a></div>';
${logic}
    document.head.insertAdjacentHTML('beforeend', navStyle);
    const bar = document.createElement('nav'); bar.id = 'global-nav';
    bar.innerHTML = '<a href="' + fix('https://loren-6q.github.io/WETNav/') + '" class="nav-logo">HUB</a><div id="nav-links">' + html + '</div>';
    document.body.prepend(bar); document.body.style.paddingTop = "40px";
}; renderNav();`;
            document.getElementById('output').style.display = 'block';
        }
        render();
    </script>
</body>
</html>
