<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>WET Hub Configurator</title>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        .app-item { background: #1e293b; border: 1px solid #334155; padding: 15px; border-radius: 8px; margin-bottom: 12px; }
        .row { display: flex; gap: 8px; margin-bottom: 8px; }
        input, textarea, select { background: #0f172a; border: 1px solid #334155; color: white; padding: 8px; border-radius: 4px; }
        .perms { font-size: 11px; background: rgba(0,0,0,0.3); padding: 8px; border-radius: 4px; display: flex; align-items: center; }
        button { cursor: pointer; border: none; border-radius: 4px; font-weight: bold; padding: 10px 20px; transition: 0.2s; }
        button:hover { opacity: 0.8; }
        .btn-gen { background: gold; color: black; font-size: 18px; width: 100%; margin-top: 20px; }
        pre, textarea#importBox { background: #000; padding: 20px; color: #adff2f; font-size: 11px; border: 1px solid #334155; width: 100%; box-sizing: border-box; min-height: 120px; }
        .count-badge { background: #37b5ff; padding: 2px 8px; border-radius: 10px; font-size: 12px; margin-left: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>WET Hub Configurator</h1>
        
        <div style="margin-bottom: 20px; background: #1e293b; padding: 15px; border-radius: 8px;">
            <h3>1. Paste your current nav.js code here:</h3>
            <textarea id="importBox" placeholder="Paste all code from nav.js here..."></textarea>
            <button onclick="importNav()" style="background: #6366f1; color: white; margin-top: 10px;">2. Load Apps from Code</button>
            <span id="loadCount" class="count-badge" style="display:none"></span>
        </div>

        <div id="app-list"></div>
        <button onclick="addApp()" style="background: #37b5ff; color: white;">+ Add New App Manually</button>
        
        <button class="btn-gen" onclick="generate()">3. Generate New nav.js</button>
        
        <div id="output" style="display:none; margin-top: 20px;">
            <h3>4. Copy this into your nav.js file:</h3>
            <button onclick="copyToClipboard()" style="background: #10b981; color: white; margin-bottom: 10px;">📋 Copy All Code</button>
            <pre id="code-box"></pre>
        </div>
    </div>

    <script>
        let apps = [];

        function render() {
            const list = document.getElementById('app-list');
            list.innerHTML = '';
            apps.forEach((app, i) => {
                list.innerHTML += `
                    <div class="app-item">
                        <div class="row">
                            <input type="text" value="${app.name}" oninput="apps[${i}].name=this.value" placeholder="Name" style="flex:2">
                            <input type="text" value="${app.icon}" oninput="apps[${i}].icon=this.value" placeholder="Icon" style="width:40px">
                            <select onchange="apps[${i}].type=this.value">
                                <option value="accounting" ${app.type==='accounting'?'selected':''}>Accounting</option>
                                <option value="admin" ${app.type==='admin'?'selected':''}>Admin</option>
                                <option value="booking" ${app.type==='booking'?'selected':''}>Booking</option>
                                <option value="quotes" ${app.type==='quotes'?'selected':''}>Quotes</option>
                                <option value="staffing" ${app.type==='staffing'?'selected':''}>Staffing</option>
                                <option value="ops" ${app.type==='ops'?'selected':''}>Ops</option>
                            </select>
                        </div>
                        <input type="text" value="${app.url}" oninput="apps[${i}].url=this.value" placeholder="URL" style="width:97%">
                        <textarea oninput="apps[${i}].desc=this.value" style="width:97%; height:40px; margin-top:5px;">${app.desc}</textarea>
                        <div class="perms">
                            Roles: ${['BOSS', 'REC', 'BAR', 'OA'].map(r => `
                                <label style="margin-right:10px"><input type="checkbox" ${app.roles.includes(r)?'checked':''} onchange="toggleRole(${i},'${r}')"> ${r}</label>
                            `).join('')}
                            <button onclick="apps.splice(${i},1); render();" style="margin-left:auto; background:red; color:white; padding:2px 10px;">Delete</button>
                        </div>
                    </div>`;
            });
        }

        function importNav() {
            const code = document.getElementById('importBox').value;
            // Create a temporary hidden element to parse the HTML strings inside the code
            const tempDiv = document.createElement('div');
            
            // This is the magic part: it extracts anything between backticks or quotes that looks like an anchor tag
            const htmlMatches = code.match(/<a\s+[\s\S]*?<\/a>/gi);
            
            if (!htmlMatches) {
                alert("Could not find any <a> tags. Make sure you pasted the full nav.js!");
                return;
            }

            apps = [];
            htmlMatches.forEach(tagString => {
                tempDiv.innerHTML = tagString;
                const link = tempDiv.querySelector('a');
                if (!link || link.innerText.toLowerCase() === 'home') return;

                // Strip out the fix('') wrapper from the href if it exists
                let url = link.getAttribute('href');
                url = url.replace(/\${fix\(['"]|fix\(['"]|['"]\)}|['"]\)/g, '');

                apps.push({
                    url: url,
                    type: link.getAttribute('data-type') || 'ops',
                    icon: link.getAttribute('data-icon') || '🔗',
                    desc: link.getAttribute('data-desc') || '',
                    name: link.innerText.trim(),
                    roles: ['BOSS'] // Default roles to BOSS on import
                });
            });

            document.getElementById('loadCount').innerText = `Found ${apps.length} Apps`;
            document.getElementById('loadCount').style.display = 'inline-block';
            render();
        }

        function toggleRole(i, r) {
            let idx = apps[i].roles.indexOf(r);
            idx > -1 ? apps[i].roles.splice(idx,1) : apps[i].roles.push(r);
        }

        function addApp() { 
            apps.push({name:'New App', url:'', type:'ops', icon:'🔗', desc:'', roles:['BOSS']}); 
            render(); 
        }

        function copyToClipboard() {
            const el = document.getElementById('code-box');
            navigator.clipboard.writeText(el.innerText).then(() => alert("Code copied!"));
        }

        function generate() {
            const types = ['accounting', 'admin', 'booking', 'quotes', 'staffing', 'ops'];
            const typeLabels = ['Acct', 'Admin', 'Booking', 'Quotes', 'Staffing', 'Ops'];
            let logic = "";

            types.forEach((type, idx) => {
                let typeApps = apps.filter(a => a.type === type);
                if(typeApps.length === 0) return;
                logic += `    // ${typeLabels[idx]}\n    let group_${type} = "";\n`;
                typeApps.forEach(app => {
                    const roles = app.roles.map(r => `'${r}'`).join(',');
                    const target = app.url.startsWith('http') && !app.url.includes('github.io') ? 'target="_blank"' : '';
                    logic += `    if ([${roles}].includes(user)) group_${type} += \`<a href="\${fix('${app.url}')}" ${target} data-type="${app.type}" data-icon="${app.icon}" data-desc="${app.desc}">${app.name}</a>\`;\n`;
                });
                logic += `    if (group_${type}) html += \`<div class="nav-item"><span class="drop-btn">${typeLabels[idx]} ▾</span><div class="dropdown-content">\${group_${type}}</div></div>\`;\n\n`;
            });

            document.getElementById('code-box').innerText = `const navStyle = \`<style>#global-nav{background:#37b5ff!important;color:white!important;font-family:sans-serif;position:fixed;top:0;left:0;width:100%;z-index:999999;display:flex;justify-content:space-between;align-items:center;padding:0 15px;height:40px;box-sizing:border-box;border-bottom:2px solid rgba(0,0,0,0.1)}.nav-logo{display:flex;align-items:center;gap:8px;text-decoration:none;color:white!important;font-weight:800;font-size:14px;height:100%}.nav-logo img{height:24px;width:auto;border-radius:3px;display:block}#nav-links{display:flex;gap:5px;align-items:center;height:100%}.nav-item{position:relative;height:100%;display:flex;align-items:center}.nav-item a,.drop-btn{color:white!important;text-decoration:none;font-size:10px;font-weight:700;padding:0 10px;cursor:pointer;border:none;background:none;display:flex;align-items:center;height:100%;transition:.2s;text-transform:uppercase;letter-spacing:.5px}.nav-item:hover>a,.nav-item:hover>.drop-btn{background:rgba(0,0,0,0.1)}.dropdown-content{display:none;position:absolute;background:white;min-width:200px;top:40px;left:0;box-shadow:0 4px 15px rgba(0,0,0,0.2);border-radius:0 0 4px(4px)}.dropdown-content a{color:#333!important;border-bottom:1px solid #eee;padding:12px 15px;height:auto!important;display:block!important;text-transform:none;letter-spacing:normal;font-size:12px}.dropdown-content a:hover{background:#f8fafc;color:#37b5ff!important}.nav-item:hover .dropdown-content{display:block}@media(max-width:950px){#nav-links{display:none;position:absolute;top:40px;left:0;width:100%;background:#37b5ff;flex-direction:column;height:auto;padding:10px 0}#nav-links.active{display:flex}.nav-item{width:100%;height:auto}.nav-item a,.drop-btn{padding:15px 20px;justify-content:center}.dropdown-content{position:relative;top:0;width:100%;background:#f1f5f9;box-shadow:none}}</style>\`;
const renderNav = () => {
    if (document.getElementById('global-nav')) return;
    const user = new URLSearchParams(window.location.search).get('user') || 'Staff';
    const fix = (u) => {
        if (!user || u === '#' || u.includes('user=')) return u;
        const sep = u.includes('?') ? '&' : '?';
        const domains = ['github.io', 'netlify.app', 'vercel.app', 'wildandwandering.com', 'wetpoolparty.com', 'onrender.com'];
        return domains.some(d => u.includes(d)) ? u + sep + 'user=' + user : u;
    };
    let html = '<div class="nav-item"><a href="' + fix('https://loren-6q.github.io/WETNav/') + '" data-type="ignore">Home</a></div>';
${logic}
    const bar = document.createElement('nav'); bar.id = 'global-nav';
    bar.innerHTML = \`<a href="\${fix('https://loren-6q.github.io/WETNav/')}" class="nav-logo"><img src="https://raw.githubusercontent.com/loren-6q/WETNav/main/logo-icon.png"><span>WET BUSINESS HUB</span></a><div id="nav-links">\${html}</div>\`;
    document.head.insertAdjacentHTML('beforeend', navStyle);
    document.body.prepend(bar); document.body.style.paddingTop = "40px";
    const btn = document.getElementById('nav-toggle'); if (btn) btn.onclick = () => document.getElementById('nav-links').classList.toggle('active');
}; renderNav();`;
            document.getElementById('output').style.display = 'block';
        }
    </script>
</body>
</html>
